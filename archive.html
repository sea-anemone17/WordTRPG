<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word TRPG - Archive</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>🗂️ 단어 아카이브</h1>
        <p class="subtitle">책 · 섹션 · 단어를 관리합니다.</p>
      </div>
      <div class="button-row">
        <a class="button" href="./index.html">홈</a>
        <a class="button" href="./study.html">학습</a>
      </div>
    </header>

    <main class="archive-layout">
      <section class="card panel">
        <div class="panel-header">
          <h2>책</h2>
        </div>

        <form id="bookForm" class="form-block">
          <label class="input-group">
            <span>책 이름</span>
            <input type="text" id="bookTitleInput" placeholder="예: 워드마스터 수능 2000" required />
          </label>
          <button class="button primary" type="submit">책 추가</button>
        </form>

        <div id="bookList" class="list-box"></div>
      </section>

      <section class="card panel">
        <div class="panel-header">
          <h2>섹션</h2>
          <p id="selectedBookInfo" class="muted">책을 선택하세요.</p>
        </div>

        <form id="sectionForm" class="form-block">
          <label class="input-group">
            <span>섹션 이름</span>
            <input type="text" id="sectionTitleInput" placeholder="예: Day 1" required />
          </label>
          <button class="button primary" type="submit">섹션 추가</button>
        </form>

        <div id="sectionList" class="list-box"></div>
      </section>

      <section class="card panel">
        <div class="panel-header">
          <h2>단어</h2>
          <p id="selectedSectionInfo" class="muted">섹션을 선택하세요.</p>
        </div>

        <div class="filter-bar">
          <label class="input-group">
            <span>검색</span>
            <input type="text" id="wordSearchInput" placeholder="단어 / 뜻 / 예문 / 메모 검색" />
          </label>

          <label class="input-group">
            <span>품사 필터</span>
            <select id="wordFilterPos">
              <option value="">전체</option>
            </select>
          </label>

          <label class="input-group">
            <span>정서값 필터</span>
            <select id="wordFilterTone">
              <option value="">전체</option>
            </select>
          </label>

          <label class="input-group">
            <span>태그 필터</span>
            <select id="wordFilterTag">
              <option value="">전체</option>
            </select>
          </label>
        </div>

        <form id="wordForm" class="form-block word-form">
          <input type="hidden" id="editingWordId" value="" />

          <label class="input-group">
            <span>단어</span>
            <input type="text" id="wordInput" placeholder="예: abandon" required />
          </label>

          <label class="input-group">
            <span>뜻 (한 줄에 하나씩)</span>
            <textarea id="meaningsInput" rows="4" placeholder="버리다&#10;포기하다" required></textarea>
          </label>

          <label class="input-group">
            <span>품사</span>
            <select id="posSelect"></select>
          </label>

          <label class="input-group">
            <span>정서값</span>
            <select id="toneSelect"></select>
          </label>

          <div class="input-group">
            <span>세부 태그 (복수 선택)</span>
            <div id="tagCheckboxGroup" class="checkbox-group"></div>
          </div>

          <label class="input-group">
            <span>예문</span>
            <textarea id="exampleInput" rows="3" placeholder="예문을 넣어도 좋고, 비워도 됩니다."></textarea>
          </label>

          <label class="input-group">
            <span>메모</span>
            <textarea id="memoInput" rows="3" placeholder="추가 메모"></textarea>
          </label>

          <div class="button-row">
            <button class="button primary" id="wordSubmitBtn" type="submit">단어 추가</button>
            <button class="button" id="cancelEditBtn" type="button">수정 취소</button>
          </div>
        </form>

        <div id="wordList" class="list-box"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./archive.js"></script>
</body>
</html>
