<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOCA Quest - Scenario</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>🕯️ Word story</h1>
        <p class="subtitle">단어를 단서로 해석하는 조사형 프로토타입</p>
      </div>
      <div class="button-row">
        <a class="button" href="./index.html">홈</a>
        <a class="button" href="./archive.html">아카이브</a>
        <a class="button" href="./study.html">일반 학습</a>
      </div>
    </header>

    <main class="trpg-layout">
      <section class="card">
        <h2>시작 설정</h2>

        <div class="form-block">
          <label class="input-group">
            <span>책 선택</span>
            <select id="trpgBookSelect"></select>
          </label>

          <label class="input-group">
            <span>섹션 선택</span>
            <select id="trpgSectionSelect"></select>
          </label>

          <label class="input-group">
            <span>시나리오 선택</span>
            <select id="scenarioSelect"></select>
          </label>

          <label class="input-group">
            <span>난이도 선택</span>
            <select id="difficultySelect"></select>
          </label>

          <div class="button-row">
            <button id="startScenarioBtn" class="button primary" type="button">시나리오 시작</button>
            <button id="restartScenarioBtn" class="button" type="button">다시 시작</button>
          </div>
        </div>

        <div class="stats-box">
          <div class="stat-item">
            <span class="stat-label">현재 장면</span>
            <strong id="sceneCounter">0 / 0</strong>
          </div>
          <div class="stat-item">
            <span class="stat-label">단서 수</span>
            <strong id="clueCount">0</strong>
          </div>
          <div class="stat-item">
            <span class="stat-label">오해 수</span>
            <strong id="mistakeCount">0</strong>
          </div>
          <div class="stat-item">
            <span class="stat-label">상태</span>
            <strong id="scenarioStatus">대기 중</strong>
          </div>
        </div>
      </section>

      <section class="card">
        <h2 id="scenarioTitle">시나리오</h2>
        <div id="scenarioIntroBox" class="study-card">
          <p class="muted">시나리오를 시작해 주세요.</p>
        </div>

        <div id="sceneBox" class="study-card">
          <p class="muted">장면이 아직 시작되지 않았습니다.</p>
        </div>

        <div id="wordEventBox" class="study-card hidden">
          <div class="study-sub">현재 단서 단어</div>
          <div id="trpgWordText" class="study-word">-</div>
          <div id="trpgWordMeta" class="study-sub">-</div>
          <div id="trpgQuizModeText" class="study-sub"></div>
          <div id="trpgTimerText" class="study-sub"></div>

          <form id="trpgAnswerForm" class="form-block">
            <label class="input-group">
              <span>뜻 입력</span>
              <input type="text" id="trpgAnswerInput" placeholder="뜻을 입력하세요" />
            </label>

            <div class="button-row">
              <button class="button primary" type="submit">해석 시도</button>
              <button id="trpgShowAnswerBtn" class="button" type="button">정답 보기</button>
            </div>
          </form>

          <div id="trpgResultBox" class="result-box"></div>

          <div id="trpgJudgeConfirmBox" class="judge-confirm-box hidden">
            <div id="trpgJudgeHintText" class="judge-hint-text"></div>
            <div class="button-row">
              <button id="trpgConfirmCorrectBtn" class="button primary" type="button">정답으로 확정</button>
              <button id="trpgConfirmWrongBtn" class="button inline-danger" type="button">오답으로 확정</button>
            </div>
          </div>
        </div>

        <div id="sceneChoiceBox" class="study-card hidden">
          <h3>선택</h3>
          <div id="choiceButtons" class="button-row"></div>
        </div>

        <div id="endingBox" class="study-card hidden">
          <h3>결과</h3>
          <div id="endingText"></div>
        </div>
      </section>

      <section class="card">
        <h2>조사 기록</h2>
        <div id="journalBox" class="log-box"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./src/trpg/index.js"></script>
</body>
</html>
