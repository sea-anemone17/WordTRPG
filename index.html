<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOCA Quest</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>📚 VOCA Quest</h1>
      <p class="subtitle">단어 태그 아카이브 + 학습 플레이</p>
    </header>

    <p id="loading-message" style="text-align:center; display:none;">
     불러오는 중...
    </p>

    <!-- 로그인 화면 -->
    <div id="auth-screen" class="card auth-card">
     <h2>로그인</h2>
     <input id="email" type="email" placeholder="이메일" />
     <input id="password" type="password" placeholder="비밀번호" />
     <div class="button-row auth-actions">
      <button id="signup-btn">회원가입</button>
      <button id="login-btn">로그인</button>
     </div>
     <p id="auth-message"></p>
    </div>
    
    <!-- 앱 본체 -->
    <div id="app-screen" style="display: none;">
      <main class="home-grid">
        <section class="card">
          <h2>시작하기</h2>
          <p>공부하기 싫어서 만든 선택형 스토리 분기 게임 겸 단어 테스트 사이트</p>
          <div class="button-row">
            <a class="button" href="./trpg.html">스토리 게임 시작</a>
            <a class="button primary" href="./archive.html">아카이브 관리</a>
            <a class="button" href="./study.html">학습 시작</a>
          </div>
        </section>

        <section class="card">
          <h2>현재 통계</h2>
          <div id="statsBox" class="stats-box">
            <div class="stat-item">
              <span class="stat-label">책 수</span>
              <strong id="bookCount">0</strong>
            </div>
            <div class="stat-item">
              <span class="stat-label">섹션 수</span>
              <strong id="sectionCount">0</strong>
            </div>
            <div class="stat-item">
              <span class="stat-label">단어 수</span>
              <strong id="wordCount">0</strong>
            </div>
            <div class="stat-item">
              <span class="stat-label">최근 학습</span>
              <strong id="recordCount">0</strong>
            </div>
          </div>
        </section>

        <section class="card account-card">
         <div class="account-header">
          <h2>계정</h2>
          <span class="account-badge">보호됨</span>
         </div>

         <p id="user-info" class="user-info-text"></p>

         <div class="account-actions">
          <button id="logout-btn" class="logout-button">로그아웃</button>
         </div>
        </section>

        <section class="card">
          <h2>사용 안내</h2>
          <ol class="guide-list">
            <li>아카이브에서 책과 섹션을 만든다.</li>
            <li>단어를 입력하고 품사/정서값/태그를 설정한다.</li>
            <li>학습 페이지에서 책/섹션을 골라 복습한다.</li>
          </ol>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
